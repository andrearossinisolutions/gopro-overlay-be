name: Deploy backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: gopro-overlay-backend-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64]

    env:
      APP_DIR: /home/arossini/apps/gopro-overlay/backend
      SERVICE_NAME: gopro-overlay-backend
      PYTHON_BIN: python3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync backend files to deploy directory
        run: |
          mkdir -p "$APP_DIR"
          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".venv" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            --exclude "data" \
            "$GITHUB_WORKSPACE/" \
            "$APP_DIR/"

      - name: Verify Python
        run: |
          which python3
          python3 --version

      - name: Create or update .env
        run: |
          cat > "$APP_DIR/.env" << 'EOF'
          ${{ secrets.BACKEND_ENV_FILE }}
          EOF
          chmod 600 "$APP_DIR/.env"

      - name: Create virtualenv and install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: |
          $PYTHON_BIN -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt